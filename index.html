<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boorapa Ponthisang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2744;
      --navy-light: #253561;
      --cream: #f5f0e8;
      --warm-white: #faf8f4;
      --gold: #c9a84c;
      --gold-light: #e8d49a;
      --muted: #7a7264;
      --border: rgba(26,39,68,0.12);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    .page {
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      background: var(--warm-white);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Hero Photo Area */
    .hero {
      width: 100%;
      height: 380px;
      position: relative;
      background: var(--navy);
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 8%;
      display: block;
      transform: scale(1.15);
      transform-origin: 50% 15%;
    }

    .hero-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-light) 60%, #3a4f7a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-placeholder svg {
      width: 80px;
      height: 80px;
      opacity: 0.25;
    }

    .hero-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to bottom, transparent, var(--warm-white));
    }

    /* Profile Section */
    .profile {
      width: 100%;
      padding: 0 28px 28px;
      text-align: center;
      margin-top: -20px;
      position: relative;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 38px;
      color: var(--navy);
      line-height: 1.1;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2.5px;
      margin-bottom: 20px;
    }

    .company {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: var(--navy);
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 24px;
    }

    /* Social Icons Row */
    .socials {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .social-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--cream);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--navy);
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .social-icon:hover {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
      transform: translateY(-2px);
    }

    .social-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold-light);
      margin: 0 auto 28px;
    }

    /* Link Buttons */
    .links {
      width: 100%;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      width: 100%;
      padding: 15px 20px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--navy);
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
    }

    .link-btn:hover {
      border-color: var(--navy);
      background: var(--navy);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(26,39,68,0.12);
    }

    .link-btn:hover .link-icon {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .link-btn:hover .link-arrow { opacity: 1; color: white; }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .link-text {
      flex: 1;
    }

    .link-label {
      font-size: 15px;
      font-weight: 500;
      display: block;
      line-height: 1.2;
    }

    .link-sub {
      font-size: 12px;
      opacity: 0.6;
      display: block;
      margin-top: 1px;
    }

    .link-arrow {
      opacity: 0.25;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .link-arrow svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
    }

    /* Accent button (LINE green) */
    .link-btn.accent-line { border-color: #00b900; }
    .link-btn.accent-line .link-icon { background: #e8f9e8; color: #00b900; }
    .link-btn.accent-line:hover { background: #00b900; border-color: #00b900; }

    /* Footer */
    .footer {
      margin-top: 40px;
      padding: 24px;
      text-align: center;
      width: 100%;
    }

    .footer-name {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .footer-copy {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.5;
      margin-top: 4px;
    }

    /* Scroll animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile { animation: fadeUp 0.5s ease 0.1s both; }
    .links { animation: fadeUp 0.5s ease 0.25s both; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,39,68,0.5);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 32px 28px 40px;
      width: 100%;
      max-width: 440px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--navy);
      margin-bottom: 18px;
    }
    .modal-close {
      float: right;
      background: var(--cream);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 16px;
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--cream);
      border-radius: 12px;
      text-decoration: none;
      color: var(--navy);
    }
    .contact-row:hover { background: var(--navy); color: white; }
    .contact-row span:first-child { font-size: 20px; }
    .contact-row .c-label { font-size: 12px; opacity: 0.6; display: block; }
    .contact-row .c-val { font-size: 14px; font-weight: 500; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { background: var(--warm-white); }

      .page {
        max-width: 100%;
        min-height: 100dvh;
      }

      .hero { height: 55vw; min-height: 220px; max-height: 360px; }

      .hero-img {
        object-position: 50% 8%;
        transform: scale(1.2);
        transform-origin: 50% 12%;
      }

      .hero-fade { height: 90px; }

      .profile {
        padding: 0 20px 20px;
        margin-top: -16px;
      }

      .name { font-size: clamp(28px, 8vw, 38px); }

      .social-icon { width: 40px; height: 40px; }

      .socials { gap: 10px; }

      .links { padding: 0 16px; }

      .link-btn { padding: 13px 16px; }

      .link-label { font-size: 14px; }

      .link-sub { font-size: 11px; }
    }

    @media (max-width: 360px) {
      .name { font-size: 26px; }
      .social-icon { width: 36px; height: 36px; }
      .socials { gap: 8px; }
    }
  </style>
</head>
